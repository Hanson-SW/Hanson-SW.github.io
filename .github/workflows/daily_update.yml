name: Daily Market Data Update

on:
  schedule:
    # 每天 UTC 时间 0点 (北京时间早上 8 点，美东时间晚上 7/8 点) 自动运行
    - cron: '0 0 * * *' 
  workflow_dispatch: # 允许你在 GitHub 网页上点击按钮手动运行测试

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 赋予 Action 推送代码到仓库的权限
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance numpy pandas

    - name: Run update script
      run: python update.py

    - name: Commit and push changes
      run: |
        # 配置一个虚拟的 git 机器人身份
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 将生成的 json 文件添加到暂存区
        git add market_data.json
        
        # 检查是否有内容变更，如果有则 commit 并 push
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily market data (market_data.json)" && git push)
