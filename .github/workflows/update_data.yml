name: 每日金融数据自动更新

on:
  push:
    branches:
      - main  # 当你手动推送代码到 main 分支时触发测试
  schedule:
    # 定时任务：使用 UTC 时间。
    # 转换为北京时间需要 +8 小时。下面代表北京时间每天下午 18:30 自动运行（A股收盘且盘后数据更新后）
    - cron: '30 10 * * *'

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装依赖库
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 运行 Python 脚本抓取并填充数据
    - name: Run data fetch script
      run: python fetch_data.py

    # 5. 自动将生成的 JSON 数据提交并推送到你的 GitHub 仓库
    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        # 只有在数据有变化时才提交，防止没有新数据时报错中断
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新真实历史数据: $(date +'%Y-%m-%d')" && git push)
