<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化资产配置系统 v3.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --accent: #8b5cf6; --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #334155; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; display: flex; justify-content: center; }
        .app-container { max-width: 1400px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .report-area { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #f1f5f9; border-radius: 12px; padding: 14px 18px; border-left: 4px solid var(--accent); }
        .stat-card .title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; font-weight: 600; }
        .stat-card .value { font-size: 22px; font-weight: 700; color: #1e293b; margin-top: 4px; }
        .stat-card .sub { font-size: 12px; color: #64748b; margin-top: 4px; line-height: 1.5; }
        .stat-card .weight-list { font-size: 12px; background: white; padding: 8px 10px; border-radius: 6px; margin-top: 6px; border: 1px dashed #cbd5e1; word-break: break-all; }
        #chart-container { width: 100%; height: 480px; min-height: 400px; }
        .settings-area { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 24px; }
        .settings-row { display: flex; flex-wrap: wrap; gap: 16px 30px; align-items: center; }
        .settings-row .group { display: flex; flex-direction: column; gap: 4px; flex: 1 1 150px; }
        .settings-row .group label { font-size: 12px; font-weight: 600; color: #475569; }
        .settings-row .group input, .settings-row .group select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; transition: 0.15s; }
        .settings-row .group input:focus, .settings-row .group select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
        .settings-row .group input[type="checkbox"] { width: 18px; height: 18px; margin-top: 6px; accent-color: var(--accent); }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.15s; font-size: 14px; }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px dashed var(--border); color: #64748b; }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: #f5f3ff; }
        .btn-danger { background: #ef4444; padding: 4px 10px; font-size: 12px; border-radius: 6px; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .asset-tag { display: inline-flex; align-items: center; background: #e2e8f0; padding: 4px 10px 4px 14px; border-radius: 20px; gap: 8px; font-size: 13px; font-weight: 500; }
        .asset-tag .del { cursor: pointer; color: #ef4444; font-weight: bold; }
        .scenario-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
        .scenario-item { background: #f1f5f9; border-radius: 20px; padding: 6px 14px 6px 18px; display: inline-flex; align-items: center; gap: 12px; font-size: 13px; border: 1px solid var(--border); }
        .scenario-item .info { display: flex; gap: 6px; align-items: center; }
        .scenario-item .info .type { background: #cbd5e1; border-radius: 12px; padding: 0 8px; font-size: 11px; color: #1e293b; }
        .status-indicator { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: #475569; }
        .status-indicator .spinner-small { width: 18px; height: 18px; border: 2px solid #e2e8f0; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { body { padding: 10px; } .stats-grid { grid-template-columns: 1fr 1fr; } #chart-container { height: 350px; } .settings-row .group { flex: 1 1 100%; } }
        @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="app-container" id="app">

    <div class="report-area" id="reportArea">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card" style="border-left-color:#f59e0b;">
                <div class="title">📈 预期年化收益 / 波动</div>
                <div class="value" id="opt-return-vol">-- / --</div>
                <div class="sub" id="sub-return-vol">最优组合</div>
            </div>
            <div class="stat-card" style="border-left-color:#10b981;">
                <div class="title">🛡️ 最大回撤 / 卡玛</div>
                <div class="value" id="opt-drawdown">--</div>
                <div class="sub" id="sub-risk-metrics">MaxDD: --<br>Calmar: --</div>
            </div>
            <div class="stat-card" style="border-left-color:#ef4444;">
                <div class="title">🏆 夏普 / 索提诺</div>
                <div class="value" id="opt-sharpe-sortino">-- / --</div>
                <div class="weight-list" id="opt-weights">加载中...</div>
            </div>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="settings-area">
        <div class="settings-row">
            <div class="group">
                <label>📅 开始日期</label>
                <input type="date" id="start-date" value="2025-01-01">
            </div>
            <div class="group">
                <label>📅 结束日期</label>
                <input type="date" id="end-date" value="2025-12-31">
            </div>
            <div class="group">
                <label>🔄 蒙特卡洛模拟次数</label>
                <input type="number" id="sim-count" value="3000" min="500" step="500">
            </div>
            <div class="group">
                <label>📉 无风险利率 (年化)</label>
                <input type="number" id="risk-free-rate" value="2.0" step="0.1"> %
            </div>
        </div>

        <div class="settings-row">
            <div class="group" style="flex-direction:row; align-items:center; gap:10px;">
                <label>🔧 优化方法</label>
                <select id="optim-method" style="flex:1;">
                    <option value="mc">蒙特卡洛模拟</option>
                    <option value="qp" selected>二次规划 (QP)</option>
                </select>
            </div>
            <div class="group" style="flex-direction:row; align-items:center; gap:6px;">
                <label>🚫 限制做空</label>
                <input type="checkbox" id="short-restrict" checked>
            </div>
            <div class="group">
                <label>📦 滚动窗口 (月数)</label>
                <input type="number" id="window-size" value="1" min="0" step="1" style="width:80px;">
                <span style="font-size:12px; color:#64748b;">(0=不使用滚动)</span>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="btn" onclick="runFullAnalysis()">🚀 重新分析</button>
                <span class="status-indicator" id="statusIndicator">
                    <span class="spinner-small" id="statusSpinner"></span>
                    <span id="statusText">✅ 就绪</span>
                </span>
            </div>
        </div>

        <div class="settings-row">
            <div class="group" style="flex:2;">
                <label>📦 资产池 (代码, 用逗号分隔)</label>
                <div style="display:flex; gap:6px; flex-wrap:wrap;">
                    <input type="text" id="asset-input" placeholder="例如 sh000300, sz399006" style="flex:1; min-width:150px;" list="stock-database">
                    <datalist id="stock-database"></datalist>
                    <select id="asset-select" style="padding:8px; border:1px solid var(--border); border-radius:8px; min-width:130px;">
                        <option value="">— 选择指数 —</option>
                    </select>
                    <button class="btn btn-sm btn-outline" onclick="addSelectedAsset()">➕ 添加</button>
                    <button class="btn btn-sm btn-outline" onclick="updateAssetPool()">更新池</button>
                </div>
                <div id="asset-tags" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;"></div>
            </div>
        </div>

        <div class="settings-row">
            <div class="group" style="flex:1;">
                <label>📊 基准指数 (对比虚线)</label>
                <select id="benchmark-select" style="padding:8px; border:1px solid var(--border); border-radius:8px;">
                    <option value="">无基准</option>
                </select>
            </div>
        </div>

        <div class="settings-row" style="flex-direction:column; align-items:stretch;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <label style="font-weight:600;">⚠️ 压力测试场景</label>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <input type="text" id="scenario-name" placeholder="场景名称" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px; width:120px;">
                    <select id="scenario-type" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px;">
                        <option value="market">市场暴跌</option>
                        <option value="rate">利率骤升</option>
                        <option value="vol">波动率冲击</option>
                    </select>
                    <input type="number" id="scenario-value" placeholder="% 变化" style="width:80px; padding:6px 10px; border:1px solid var(--border); border-radius:6px;" step="0.1">
                    <input type="date" id="scenario-date" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px;">
                    <button class="btn btn-sm" onclick="addScenario()">➕ 添加</button>
                </div>
            </div>
            <div class="scenario-list" id="scenario-list"></div>
        </div>

        <div style="display:flex; gap:12px; justify-content:flex-end; border-top:1px solid var(--border); padding-top:16px;">
            <button class="btn btn-outline" onclick="downloadReport()">📥 下载报告截图</button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  配置与映射
    // ============================================================
    const INDEX_NAMES = {
        'sh000001': '上证指数',
        'sz399001': '深证成指',
        'sz399006': '创业板指',
        'sh000300': '沪深300',
        'sh000016': '上证50',
        'sh000905': '中证500',
        'sh000852': '中证1000',
        'sh000688': '科创50',
        'sz399300': '沪深300(深)'
    };
    const INDEX_LIST = Object.entries(INDEX_NAMES).map(([code, name]) => ({ code, name }));

    // ============================================================
    //  全局变量
    // ============================================================
    let myChart = null;
    let assetPool = ['sh000300', 'sz399006', 'sh000688'];
    let scenarios = [];
    let cachedData = null;
    let currentResult = null;

    // ============================================================
    //  数据生成 (模拟 2025 年日频数据)
    // ============================================================
    function generateDeterministic2025Data() {
        const store = {};
        const assets = Object.keys(INDEX_NAMES);
        const dates = [];
        let d = new Date('2025-01-01');
        const end = new Date('2025-12-31');
        while (d <= end) {
            if (d.getDay() !== 0 && d.getDay() !== 6) dates.push(d.toISOString().slice(0,10));
            d.setDate(d.getDate() + 1);
        }
        let seed = 1024;
        function lcg() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
        const initPrices = { 'sh000001':3000, 'sz399001':11000, 'sz399006':1900, 'sh000300':3400, 'sh000016':2600, 'sh000905':5600, 'sh000852':6200, 'sh000688':850, 'sz399300':3400 };
        const vols = { 'sh000001':0.012, 'sz399001':0.016, 'sz399006':0.022, 'sh000300':0.012, 'sh000016':0.010, 'sh000905':0.018, 'sh000852':0.020, 'sh000688':0.026, 'sz399300':0.012 };
        assets.forEach(code => { store[code] = {}; });
        let prices = {};
        assets.forEach(code => { prices[code] = initPrices[code] || 1000; });
        dates.forEach(date => {
            let mf = lcg() - 0.488;
            assets.forEach(code => {
                let vol = vols[code] || 0.015;
                let r = mf * vol + (lcg() - 0.5) * vol * 0.6 + 0.0003;
                prices[code] *= (1 + r);
                store[code][date] = prices[code];
            });
        });
        return store;
    }
    cachedData = generateDeterministic2025Data();

    // ============================================================
    //  工具函数
    // ============================================================
    function mean(arr) { return arr.reduce((a,b)=>a+b,0) / arr.length; }
    function covariance(x, y, mx, my) {
        let s=0; for (let i=0;i<x.length;i++) s += (x[i]-mx)*(y[i]-my);
        return s / (x.length-1);
    }

    async function fetchAssetData(code) {
        const start = document.getElementById('start-date').value;
        const end = document.getElementById('end-date').value;
        // 优先使用内置模拟数据（仅限2025年）
        if (start === '2025-01-01' && end === '2025-12-31' && cachedData[code]) {
            return cachedData[code];
        }
        // 尝试远程加载
        try {
            const url = `https://hanson-sw.github.io/data/${code}.json?t=${Date.now()}`;
            const resp = await fetch(url);
            if (!resp.ok) return null;
            const text = await resp.text();
            if (text.trim().startsWith('<')) return null;
            const data = JSON.parse(text.replace(/NaN/g,'null'));
            const dict = {};
            for (let i=0; i<data.dates.length; i++) dict[data.dates[i]] = data.values[i][1];
            return dict;
        } catch { 
            return null;
        }
    }

    function findNearestDate(targetDate, dateArray) {
        if (!targetDate) return null;
        const sorted = dateArray.slice().sort();
        let nearest = null, minDiff = Infinity;
        for (let d of sorted) {
            const diff = Math.abs(new Date(d) - new Date(targetDate));
            if (diff < minDiff) { minDiff = diff; nearest = d; }
        }
        return nearest;
    }

    // ============================================================
    //  优化求解器
    // ============================================================
    function solveQP(returns, riskFree, restrictShort) {
        const n = returns.length;
        const T = returns[0].length;
        const mu = returns.map(r => mean(r) * 252);
        const cov = Array.from({length:n}, (_,i) => Array.from({length:n}, (_,j) => {
            const mi = mu[i]/252, mj = mu[j]/252;
            return covariance(returns[i], returns[j], mi, mj) * 252;
        }));
        let w = Array(n).fill(1/n);
        const maxIter = 1000, lr = 0.001, lambda = 1.0;
        for (let iter=0; iter<maxIter; iter++) {
            let grad = Array(n).fill(0);
            for (let i=0; i<n; i++) {
                let sum = 0;
                for (let j=0; j<n; j++) sum += cov[i][j] * w[j];
                grad[i] = 2 * sum - lambda * mu[i];
            }
            let wNew = w.map((v,i) => v - lr * grad[i]);
            if (restrictShort) {
                wNew = wNew.map(v => Math.max(0, v));
                let s = wNew.reduce((a,b)=>a+b,0);
                if (s>0) wNew = wNew.map(v => v/s);
            } else {
                let s = wNew.reduce((a,b)=>a+b,0);
                wNew = wNew.map(v => v/s);
            }
            let diff = 0;
            for (let i=0; i<n; i++) diff += (wNew[i]-w[i])**2;
            w = wNew;
            if (diff < 1e-8) break;
        }
        let portReturn = 0, portVar = 0;
        for (let i=0; i<n; i++) {
            portReturn += w[i] * mu[i];
            for (let j=0; j<n; j++) portVar += w[i]*w[j]*cov[i][j];
        }
        const portVol = Math.sqrt(portVar);
        const sharpe = (portReturn - riskFree) / portVol;
        return { weights: w, ret: portReturn, vol: portVol, sharpe };
    }

    function monteCarloOptimize(returns, numSim, riskFree, restrictShort) {
        const n = returns.length;
        const mu = returns.map(r => mean(r) * 252);
        const cov = Array.from({length:n}, (_,i) => Array.from({length:n}, (_,j) => {
            const mi = mu[i]/252, mj = mu[j]/252;
            return covariance(returns[i], returns[j], mi, mj) * 252;
        }));
        let bestSharpe = -Infinity, bestW = null, bestRet=0, bestVol=0;
        for (let s=0; s<numSim; s++) {
            let w = Array.from({length:n}, () => Math.random());
            if (restrictShort) {
                let sum = w.reduce((a,b)=>a+b,0);
                w = w.map(v => v/sum);
            } else {
                let sum = w.reduce((a,b)=>a+b,0);
                w = w.map(v => v/sum);
            }
            let portRet = 0, portVar = 0;
            for (let i=0; i<n; i++) {
                portRet += w[i] * mu[i];
                for (let j=0; j<n; j++) portVar += w[i]*w[j]*cov[i][j];
            }
            const portVol = Math.sqrt(portVar);
            const sharpe = (portRet - riskFree) / portVol;
            if (sharpe > bestSharpe) {
                bestSharpe = sharpe; bestW = w.slice(); bestRet = portRet; bestVol = portVol;
            }
        }
        return { weights: bestW, ret: bestRet, vol: bestVol, sharpe: bestSharpe };
    }

    // ============================================================
    //  状态指示器控制
    // ============================================================
    function setStatus(busy, message) {
        const spinner = document.getElementById('statusSpinner');
        const text = document.getElementById('statusText');
        if (busy) {
            spinner.style.display = 'inline-block';
            text.textContent = message || '⏳ 运算中...';
            text.style.color = '#475569';
        } else {
            spinner.style.display = 'none';
            text.textContent = message || '✅ 就绪';
            if (message && message.includes('错误')) {
                text.style.color = '#ef4444';
            } else {
                text.style.color = '#475569';
            }
        }
    }

    // ============================================================
    //  主分析函数
    // ============================================================
    async function runFullAnalysis() {
        setStatus(true, '⏳ 正在获取数据...');
        console.log('runFullAnalysis started');
        try {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const simCount = parseInt(document.getElementById('sim-count').value) || 3000;
            const riskFree = parseFloat(document.getElementById('risk-free-rate').value) / 100;
            const restrictShort = document.getElementById('short-restrict').checked;
            const method = document.getElementById('optim-method').value;
            const windowMonths = parseInt(document.getElementById('window-size').value) || 0;
            const benchmarkCode = document.getElementById('benchmark-select').value;

            const allCodes = [...assetPool];
            if (benchmarkCode && !allCodes.includes(benchmarkCode)) allCodes.push(benchmarkCode);
            console.log('Asset codes:', allCodes);

            // 获取数据
            const dataStore = {};
            await Promise.all(allCodes.map(async (code) => {
                const dict = await fetchAssetData(code);
                if (dict) dataStore[code] = dict;
                else console.warn(`Data for ${code} not found`);
            }));
            
            for (let code of allCodes) {
                if (!dataStore[code]) throw new Error(`数据缺失: ${code}`);
            }

            // 对齐日期
            let allDates = Object.keys(dataStore[allCodes[0]]).filter(d => d>=startDate && d<=endDate).sort();
            for (let code of allCodes) {
                allDates = allDates.filter(d => dataStore[code][d] !== undefined && dataStore[code][d] !== null);
            }
            if (allDates.length < 20) throw new Error('有效交易日不足');

            // 构建资产收益矩阵
            const returnsMatrix = assetPool.map(code => {
                const r = [];
                for (let i=1; i<allDates.length; i++) {
                    const p0 = dataStore[code][allDates[i-1]];
                    const p1 = dataStore[code][allDates[i]];
                    r.push((p1-p0)/p0);
                }
                return r;
            });

            let optWeights = null, optRet = 0, optVol = 0, optSharpe = 0;
            let netValues = [1.0];
            let dailyRets = [];

            setStatus(true, '⏳ 正在优化...');

            // --- 新增：预处理压力测试的日期和冲击值 ---
            const scenarioShocks = {};
            scenarios.forEach(sc => {
                const targetDate = findNearestDate(sc.date, allDates);
                if (targetDate) {
                    scenarioShocks[targetDate] = (scenarioShocks[targetDate] || 0) + (sc.value / 100);
                }
            });
            // ------------------------------------------

            if (windowMonths > 0 && windowMonths < allDates.length/21) {
                const windowSize = windowMonths * 21;
                const step = Math.floor(windowSize/2);
                let startIdx = 0;
                while (startIdx + windowSize < allDates.length - 1) {
                    const endIdx = startIdx + windowSize;
                    const winReturns = assetPool.map(code => {
                        const r = [];
                        for (let i=startIdx+1; i<=endIdx; i++) {
                            const p0 = dataStore[code][allDates[i-1]];
                            const p1 = dataStore[code][allDates[i]];
                            r.push((p1-p0)/p0);
                        }
                        return r;
                    });
                    let res;
                    if (method === 'qp') res = solveQP(winReturns, riskFree, restrictShort);
                    else res = monteCarloOptimize(winReturns, simCount, riskFree, restrictShort);
                    
                    for (let i=endIdx; i<Math.min(endIdx+step, allDates.length-1); i++) {
                        let dayRet = 0;
                        const currentDate = allDates[i+1];
                        for (let a=0; a<assetPool.length; a++) {
                            const p0 = dataStore[assetPool[a]][allDates[i]];
                            const p1 = dataStore[assetPool[a]][allDates[i+1]];
                            dayRet += res.weights[a] * (p1-p0)/p0;
                        }
                        // --- 叠加压测冲击 ---
                        if (scenarioShocks[currentDate]) dayRet += scenarioShocks[currentDate];
                        
                        dailyRets.push(dayRet);
                        netValues.push(netValues[netValues.length-1] * (1+dayRet));
                    }
                    startIdx += step;
                }
                if (netValues.length > 1) {
                    const lastRes = solveQP(returnsMatrix, riskFree, restrictShort);
                    optWeights = lastRes.weights;
                    for (let i=startIdx; i<allDates.length-1; i++) {
                        let dayRet = 0;
                        const currentDate = allDates[i+1];
                        for (let a=0; a<assetPool.length; a++) {
                            const p0 = dataStore[assetPool[a]][allDates[i]];
                            const p1 = dataStore[assetPool[a]][allDates[i+1]];
                            dayRet += lastRes.weights[a] * (p1-p0)/p0;
                        }
                        // --- 叠加压测冲击 ---
                        if (scenarioShocks[currentDate]) dayRet += scenarioShocks[currentDate];

                        dailyRets.push(dayRet);
                        netValues.push(netValues[netValues.length-1] * (1+dayRet));
                    }
                }
                const finalRet = mean(dailyRets) * 252;
                const finalVol = Math.sqrt(mean(dailyRets.map(r=>r*r))) * Math.sqrt(252);
                const sharpe = (finalRet - riskFree) / finalVol;
                optRet = finalRet; optVol = finalVol; optSharpe = sharpe;
                if (!optWeights) optWeights = Array(assetPool.length).fill(1/assetPool.length);
            } else {
                let res;
                if (method === 'qp') res = solveQP(returnsMatrix, riskFree, restrictShort);
                else res = monteCarloOptimize(returnsMatrix, simCount, riskFree, restrictShort);
                optWeights = res.weights;
                optRet = res.ret;
                optVol = res.vol;
                optSharpe = res.sharpe;
                
                for (let i=1; i<allDates.length; i++) {
                    let dayRet = 0;
                    const currentDate = allDates[i];
                    for (let a=0; a<assetPool.length; a++) {
                        const p0 = dataStore[assetPool[a]][allDates[i-1]];
                        const p1 = dataStore[assetPool[a]][allDates[i]];
                        dayRet += optWeights[a] * (p1-p0)/p0;
                    }
                    
                    // --- 叠加压测冲击 ---
                    if (scenarioShocks[currentDate]) {
                        dayRet += scenarioShocks[currentDate];
                    }
                    // --------------------

                    dailyRets.push(dayRet);
                    netValues.push(netValues[netValues.length-1] * (1+dayRet));
                }
            }

            // 计算指标
            let peak = 1.0, maxDD = 0;
            for (let v of netValues) {
                if (v > peak) peak = v;
                const dd = (peak - v) / peak;
                if (dd > maxDD) maxDD = dd;
            }
            const negRets = dailyRets.filter(r => r < 0);
            let downsideVar = negRets.length ? negRets.reduce((a,b)=>a+b*b,0) / dailyRets.length : 0;
            const downsideVol = Math.sqrt(downsideVar) * Math.sqrt(252);
            const sortino = downsideVol ? (optRet - riskFree) / downsideVol : 0;
            const calmar = maxDD ? optRet / maxDD : 0;

            // 更新统计卡片
            const fmtPct = v => (v*100).toFixed(2)+'%';
            document.getElementById('opt-return-vol').innerText = `${fmtPct(optRet)} / ${fmtPct(optVol)}`;
            document.getElementById('opt-drawdown').innerText = fmtPct(maxDD);
            document.getElementById('sub-risk-metrics').innerHTML = `MaxDD: ${fmtPct(maxDD)}<br>Calmar: ${calmar.toFixed(2)}`;
            document.getElementById('opt-sharpe-sortino').innerText = `${optSharpe.toFixed(2)} / ${sortino.toFixed(2)}`;
            let wStr = assetPool.map((code,i) => {
                const name = INDEX_NAMES[code] || code;
                return `${code}(${name}): ${(optWeights[i]*100).toFixed(1)}%`;
            }).join(' | ');
            document.getElementById('opt-weights').innerText = '最优配比: ' + wStr;

            // 基准净值
            let benchmarkValues = null;
            if (benchmarkCode && dataStore[benchmarkCode]) {
                const bPrices = allDates.map(d => dataStore[benchmarkCode][d]);
                const base = bPrices[0] || 1;
                benchmarkValues = bPrices.map(p => p / base);
            }

            currentResult = { netValues, allDates, dailyRets, optRet, optVol, maxDD, calmar, sharpe:optSharpe, sortino, weights:optWeights, assetPool, scenarios, benchmarkValues, benchmarkCode };

            setStatus(true, '⏳ 正在绘制图表...');
            renderChart(allDates, netValues, optWeights, dailyRets, optRet, optVol, maxDD, calmar, optSharpe, sortino, benchmarkValues, benchmarkCode);
            setStatus(false, '✅ 完成');

        } catch (err) {
            console.error('分析出错:', err);
            alert('分析出错: ' + err.message);
            setStatus(false, '❌ 错误: ' + err.message);
        }
    }

    // ============================================================
    //  图表绘制 
    // ============================================================
    function renderChart(dates, netValues, weights, dailyRets, ret, vol, maxDD, calmar, sharpe, sortino, benchmarkValues, benchmarkCode) {
        if (!myChart) {
            myChart = echarts.init(document.getElementById('chart-container'));
        }

        const scenarioData = scenarios.map(sc => {
            const nearest = findNearestDate(sc.date, dates);
            if (nearest) return { ...sc, date: nearest };
            return null;
        }).filter(Boolean);

        const markLineData = scenarioData.map(sc => ({
            xAxis: sc.date,
            label: {
                formatter: `${sc.name}\n${sc.type}: ${sc.value}%`,
                position: 'insideEndTop',
                fontSize: 10,
                color: '#ef4444'
            },
            lineStyle: { color: '#ef4444', type: 'dashed', width: 2 }
        }));

        let series = [{
            name: '组合净值',
            type: 'line',
            data: netValues,
            smooth: true,
            symbol: 'none',
            lineStyle: { width: 3, color: '#8b5cf6' },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0,0,0,1, [
                    { offset: 0, color: 'rgba(139,92,246,0.3)' },
                    { offset: 1, color: 'rgba(139,92,246,0.0)' }
                ])
            },
            markLine: {
                silent: true,
                data: markLineData,
                label: { show: true, formatter: '{b}', fontSize: 10 }
            }
        }];

        if (benchmarkValues && benchmarkCode) {
            const benchName = INDEX_NAMES[benchmarkCode] || benchmarkCode;
            series.push({
                name: `基准 (${benchName})`,
                type: 'line',
                data: benchmarkValues,
                smooth: true,
                symbol: 'none',
                lineStyle: { width: 2, color: '#ef4444', type: 'dashed' }
            });
        }

        const option = {
            title: {
                text: '组合净值 & 对比基准',
                left: 'center',
                top: 5,
                textStyle: { fontSize: 16 }
            },
            tooltip: { trigger: 'axis' },
            toolbox: {
                feature: { saveAsImage: { name: '组合分析报告', pixelRatio: 2 } },
                right: 20,
                top: 10
            },
            legend: {
                data: series.map(s => s.name),
                bottom: 0
            },
            // 优化了 bottom 边距，拉开 X 轴文字与底侧图例的距离，防止重叠
            grid: { left: 50, right: 20, top: 50, bottom: 65 },
            xAxis: {
                type: 'category',
                data: dates,
                boundaryGap: false,
                axisLabel: { 
                    rotate: 30, 
                    fontSize: 9, // 缩小字体
                    color: 'rgba(71, 85, 105, 0.7)', // 降低透明度以减弱视觉堆叠干扰
                    interval: 4, // 间隔5个交易日 (即1周) 显示一次
                    formatter: function(value, index) {
                        const y = value.substring(0, 4);
                        const md = value.substring(5);
                        const prevDate = index > 0 ? dates[index - 1] : null;
                        // 如果是第一个日期，或是跨年节点，则显示带年份的全称
                        if (!prevDate || prevDate.substring(0, 4) !== y) {
                            return value; 
                        }
                        return md; 
                    }
                }
            },
            yAxis: {
                type: 'value',
                name: '净值',
                scale: true,
                nameGap: 30
            },
            series: series
        };
        myChart.setOption(option, true);
        myChart.resize();
    }

    // ============================================================
    //  资产池管理
    // ============================================================
    function updateAssetPool() {
        const input = document.getElementById('asset-input');
        const codes = input.value.split(',').map(s => s.trim().toLowerCase()).filter(s => s);
        if (codes.length < 2) { alert('请至少输入2个代码'); return; }
        assetPool = codes;
        renderAssetTags();
        runFullAnalysis();
    }

    function renderAssetTags() {
        const container = document.getElementById('asset-tags');
        container.innerHTML = assetPool.map((code, idx) => {
            const name = INDEX_NAMES[code] || code;
            return `<span class="asset-tag">
                ${code.toUpperCase()} (${name})
                <span class="del" onclick="removeAsset(${idx})">✕</span>
            </span>`;
        }).join('');
        document.getElementById('asset-input').value = assetPool.join(', ');
    }

    function removeAsset(idx) {
        assetPool.splice(idx, 1);
        if (assetPool.length < 2) assetPool = ['sh000300', 'sz399006'];
        renderAssetTags();
        runFullAnalysis();
    }

    function addSelectedAsset() {
        const select = document.getElementById('asset-select');
        const code = select.value;
        if (!code) { alert('请选择一个指数'); return; }
        if (!assetPool.includes(code)) {
            assetPool.push(code);
            renderAssetTags();
            runFullAnalysis();
        } else {
            alert('该资产已在池中');
        }
        select.value = '';
    }

    // ============================================================
    //  压力场景管理 (修复后)
    // ============================================================
    function addScenario() {
        const name = document.getElementById('scenario-name').value.trim() || '场景' + (scenarios.length+1);
        const type = document.getElementById('scenario-type').value;
        const value = parseFloat(document.getElementById('scenario-value').value);
        let date = document.getElementById('scenario-date').value;
        
        if (!date) { alert('请选择日期'); return; }
        if (isNaN(value)) { alert('请输入有效数值'); return; }

        let allDates = currentResult ? currentResult.allDates : [];
        if (allDates.length === 0) {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            const temp = generateDeterministic2025Data();
            const code = 'sh000300';
            allDates = Object.keys(temp[code]).filter(d => d>=start && d<=end).sort();
        }
        
        const nearest = findNearestDate(date, allDates);
        if (nearest) date = nearest;
        else { alert('日期不在数据范围内'); return; }

        // 加入数组
        scenarios.push({ name, type, value, date });
        renderScenarios();
        
        // 清空输入
        document.getElementById('scenario-name').value = '';
        document.getElementById('scenario-value').value = '';

        // 核心修复：直接重新运行分析并重算所有指标
        runFullAnalysis();
    }

    function removeScenario(idx) {
        scenarios.splice(idx, 1);
        renderScenarios();
        // 核心修复：删除后重新运行分析以抹除冲击
        runFullAnalysis();
    }

    function renderScenarios() {
        const container = document.getElementById('scenario-list');
        container.innerHTML = scenarios.map((s, idx) => `
            <span class="scenario-item" data-name="${s.name}" data-type="${s.type}" data-value="${s.value}" data-date="${s.date}">
                <span class="info">
                    <strong>${s.name}</strong>
                    <span class="type">${s.type === 'market' ? '暴跌' : s.type === 'rate' ? '利率' : '波动'}</span>
                    <span style="color:${s.value < 0 ? '#ef4444' : '#10b981'}">${s.value}%</span>
                    <span style="color:#64748b;font-size:11px;">${s.date}</span>
                </span>
                <span class="del" onclick="removeScenario(${idx})" style="cursor:pointer;color:#ef4444;font-weight:bold;">✕</span>
            </span>
        `).join('');
    }

    // ============================================================
    //  下载报告截图
    // ============================================================
    function downloadReport() {
        const element = document.getElementById('app');
        html2canvas(element, { scale: 2, useCORS: true, allowTaint: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = `量化报告_${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }).catch(err => alert('截图生成失败: ' + err));
    }

    // ============================================================
    //  初始化
    // ============================================================
    function initUI() {
        // 填充下拉
        const select = document.getElementById('asset-select');
        const datalist = document.getElementById('stock-database');
        const benchSelect = document.getElementById('benchmark-select');
        INDEX_LIST.forEach(({code, name}) => {
            const opt = document.createElement('option');
            opt.value = code;
            opt.textContent = `${code} (${name})`;
            select.appendChild(opt);
            const dlOpt = document.createElement('option');
            dlOpt.value = code;
            dlOpt.textContent = `${code} (${name})`;
            datalist.appendChild(dlOpt);
            const benchOpt = document.createElement('option');
            benchOpt.value = code;
            benchOpt.textContent = `${code} (${name})`;
            benchSelect.appendChild(benchOpt);
        });

        const allDates = Object.keys(cachedData['sh000300']).sort();
        const d1 = findNearestDate('2025-06-01', allDates);
        const d2 = findNearestDate('2025-09-15', allDates);
        if (d1) scenarios.push({ name: '市场暴跌', type: 'market', value: -15, date: d1 });
        if (d2) scenarios.push({ name: '利率骤升', type: 'rate', value: 0.5, date: d2 });
        renderScenarios();

        renderAssetTags();
        document.getElementById('benchmark-select').value = 'sh000300';
        runFullAnalysis();

        window.addEventListener('resize', () => { if (myChart) myChart.resize(); });
    }

    window.onload = initUI;
</script>
