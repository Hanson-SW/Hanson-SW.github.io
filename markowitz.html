<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化资产配置系统 v1.2 / Quant Asset Allocation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --accent: #8b5cf6; --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #334155; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; display: flex; justify-content: center; position: relative;}
        
        .top-utility-bar { position: absolute; top: 15px; right: 20px; z-index: 1000; }
        .lang-toggle-btn { background: rgba(255,255,255,0.8); border: 1px solid #cbd5e1; border-radius: 20px; padding: 0.4rem 1.2rem; font-size: 0.85rem; font-weight: 600; color: #334155; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s; }
        .lang-toggle-btn:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.15); }
        .lang-toggle-btn.en-active { background: var(--accent); color: white; border-color: var(--accent); }

        body.lang-en [data-i18n], body.lang-en input::placeholder, body.lang-en select, body.lang-en option, body.lang-en .btn {
            font-family: 'Arial Narrow', -apple-system, sans-serif !important;
            font-size: 0.85em !important; 
            letter-spacing: -0.2px !important;
            white-space: nowrap !important;
        }
        body.lang-en .stat-card .title { font-size: 9.5px !important; letter-spacing: -0.5px !important;}
        body.lang-en .btn { padding-left: 8px !important; padding-right: 8px !important; }
        body.lang-en .group label, body.lang-en .stat-sub { font-size: 11px !important; white-space: nowrap !important; }

        .app-container { max-width: 1400px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .report-area { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #f1f5f9; border-radius: 12px; padding: 14px 18px; border-left: 4px solid var(--accent); display: flex; flex-direction: column; justify-content: space-between; }
        .stat-card .title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; font-weight: 600; }
        .stat-card .value { font-size: 22px; font-weight: 700; color: #1e293b; margin-top: 4px; }
        .stat-card .sub { font-size: 12px; color: #64748b; margin-top: 4px; line-height: 1.5; }
        
        .stat-card .weight-list { font-size: 11px; background: white; padding: 6px 8px; border-radius: 6px; margin-top: 6px; border: 1px dashed #cbd5e1; word-break: break-all; white-space: normal !important; max-height: 65px; overflow-y: auto; }
        body.lang-en .stat-card .weight-list { font-size: 10px !important; line-height: 1.2; }

        #chart-container { width: 100%; height: 500px; min-height: 400px; }
        .settings-area { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 24px; }
        .settings-row { display: flex; flex-wrap: wrap; gap: 16px 30px; align-items: center; }
        .settings-row .group { display: flex; flex-direction: column; gap: 4px; flex: 1 1 150px; }
        .settings-row .group label { font-size: 12px; font-weight: 600; color: #475569; }
        .settings-row .group input, .settings-row .group select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; transition: 0.15s; }
        .settings-row .group input:focus, .settings-row .group select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
        .settings-row .group input[type="checkbox"] { width: 18px; height: 18px; margin-top: 6px; accent-color: var(--accent); }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.15s; font-size: 14px; }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px dashed var(--border); color: #64748b; }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: #f5f3ff; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .asset-tag { display: inline-flex; align-items: center; background: #e2e8f0; padding: 4px 10px 4px 14px; border-radius: 20px; gap: 8px; font-size: 13px; font-weight: 500; }
        .asset-tag .del { cursor: pointer; color: #ef4444; font-weight: bold; }
        .scenario-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
        .scenario-item { background: #f1f5f9; border-radius: 20px; padding: 6px 14px 6px 18px; display: inline-flex; align-items: center; gap: 12px; font-size: 13px; border: 1px solid var(--border); }
        .scenario-item .info { display: flex; gap: 6px; align-items: center; }
        .scenario-item .info .type { background: #cbd5e1; border-radius: 12px; padding: 0 8px; font-size: 11px; color: #1e293b; }
        .status-indicator { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: #475569; }
        .status-indicator .spinner-small { width: 18px; height: 18px; border: 2px solid #e2e8f0; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="top-utility-bar">
    <button onclick="toggleLang()" class="lang-toggle-btn" id="langBtn">
        <i class="fas fa-globe"></i> <span data-i18n="langBtn">中 / EN</span>
    </button>
</div>

<div class="app-container" id="app">
    <div class="report-area" id="reportArea">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card" style="border-left-color:#f59e0b;">
                <div class="title" data-i18n="stat1Title">📈 预期年化收益 / 波动</div>
                <div class="value" id="opt-return-vol">-- / --</div>
                <div class="sub" id="sub-return-vol" data-i18n="stat1Sub">最优组合</div>
            </div>
            <div class="stat-card" style="border-left-color:#10b981;">
                <div class="title" data-i18n="stat2Title">🛡️ 最大回撤 / 卡玛</div>
                <div class="value" id="opt-drawdown">--</div>
                <div class="sub" id="sub-risk-metrics">MaxDD: --<br>Calmar: --</div>
            </div>
            <div class="stat-card" style="border-left-color:#ef4444;">
                <div class="title" data-i18n="stat3Title">🏆 夏普 / 索提诺</div>
                <div class="value" id="opt-sharpe-sortino">-- / --</div>
                <div class="weight-list" id="opt-weights" data-i18n="loading">加载中...</div>
            </div>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="settings-area">
        <div class="settings-row">
            <div class="group"><label data-i18n="dStart">📅 开始日期</label><input type="date" id="start-date" value="2024-01-01"></div>
            <div class="group"><label data-i18n="dEnd">📅 结束日期</label><input type="date" id="end-date" value="2025-12-31"></div>
            <div class="group"><label data-i18n="dSim">🔄 蒙特卡洛模拟次数</label><input type="number" id="sim-count" value="3000" min="500" step="500"></div>
            <div class="group"><label data-i18n="dRf">📉 无风险利率 (年化)</label><input type="number" id="risk-free-rate" value="2.0" step="0.1"> %</div>
        </div>
        <div class="settings-row">
            <div class="group" style="flex-direction:row; align-items:center; gap:10px;">
                <label data-i18n="dOpt">🔧 优化方法</label>
                <select id="optim-method" style="flex:1;">
                    <option value="mc" data-i18n="oMc">蒙特卡洛模拟</option>
                    <option value="qp" selected data-i18n="oQp">二次规划 (QP-最大夏普)</option>
                </select>
            </div>
            <div class="group" style="flex-direction:row; align-items:center; gap:6px;"><label data-i18n="dShort">🚫 限制做空</label><input type="checkbox" id="short-restrict" checked></div>
            <div class="group">
                <label data-i18n="dRoll">📦 滚动窗口 (月数)</label>
                <input type="number" id="window-size" value="3" min="0" step="1" style="width:80px;">
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="btn" onclick="runFullAnalysis()" data-i18n="btnRe">🚀 重新分析</button>
                <span class="status-indicator" id="statusIndicator">
                    <span class="spinner-small" id="statusSpinner"></span>
                    <span id="statusText" data-i18n="sReady">✅ 就绪</span>
                </span>
            </div>
        </div>
        <div class="settings-row">
            <div class="group" style="flex:2;">
                <label data-i18n="dPool">📦 资产池 (代码, 用逗号分隔)</label>
                <div style="display:flex; gap:6px; flex-wrap:wrap;">
                    <input type="text" id="asset-input" data-i18n="phPool" placeholder="例如 sh000300" style="flex:1; min-width:150px;" list="stock-database">
                    <datalist id="stock-database"></datalist>
                    <select id="asset-select" style="padding:8px; border:1px solid var(--border); border-radius:8px; min-width:130px;">
                        <option value="" data-i18n="oSelIdx">— 选择指数 —</option>
                    </select>
                    <button class="btn btn-sm btn-outline" onclick="addSelectedAsset()" data-i18n="btnAdd">➕ 添加</button>
                    <button class="btn btn-sm btn-outline" onclick="updateAssetPool()" data-i18n="btnUp">更新池</button>
                </div>
                <div id="asset-tags" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;"></div>
            </div>
        </div>
        <div class="settings-row">
            <div class="group" style="flex:1;">
                <label data-i18n="dBench">📊 基准指数</label>
                <select id="benchmark-select" style="padding:8px; border:1px solid var(--border); border-radius:8px;">
                    <option value="" data-i18n="oNoB">无基准</option>
                </select>
            </div>
        </div>
        <div class="settings-row" style="flex-direction:column; align-items:stretch;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <label style="font-weight:600;" data-i18n="dStress">⚠️ 压力测试场景</label>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <input type="text" id="scenario-name" data-i18n="phName" placeholder="场景名称" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px; width:120px;">
                    <select id="scenario-type" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px;">
                        <option value="market" data-i18n="sm">市场暴跌</option>
                        <option value="rate" data-i18n="sr">利率骤升</option>
                        <option value="vol" data-i18n="sv">波动率冲击</option>
                    </select>
                    <input type="number" id="scenario-value" data-i18n="phPct" placeholder="% 变化" style="width:80px; padding:6px 10px; border:1px solid var(--border); border-radius:6px;" step="0.1">
                    <input type="date" id="scenario-date" style="padding:6px 10px; border:1px solid var(--border); border-radius:6px;">
                    <button class="btn btn-sm" onclick="addScenario()" data-i18n="sAdd">➕ 添加</button>
                </div>
            </div>
            <div class="scenario-list" id="scenario-list"></div>
        </div>
    </div>
</div>

<script>
    const i18n = {
        stat1Title: { zh: "📈 预期年化收益 / 波动", en: "📈 Exp. Return / Vol" },
        stat1Sub: { zh: "最优组合", en: "Opt. Portfolio" },
        stat2Title: { zh: "🛡️ 最大回撤 / 卡玛", en: "🛡️ Max DD / Calmar" },
        stat3Title: { zh: "🏆 夏普 / 索提诺", en: "🏆 Sharpe / Sortino" },
        dStart: { zh: "📅 开始日期", en: "📅 Start Date" },
        dEnd: { zh: "📅 结束日期", en: "📅 End Date" },
        dSim: { zh: "🔄 蒙特卡洛模拟次数", en: "🔄 MC Sim Count" },
        dRf: { zh: "📉 无风险利率 (年化)", en: "📉 Risk-Free Rate" },
        dOpt: { zh: "🔧 优化方法", en: "🔧 Optimizer" },
        oMc: { zh: "蒙特卡洛模拟", en: "Monte Carlo Sim" },
        oQp: { zh: "二次规划 (QP-最大夏普)", en: "Quadratic Prog" },
        dShort: { zh: "🚫 限制做空", en: "🚫 No Shorting" },
        dRoll: { zh: "📦 滚动窗口 (月数)", en: "📦 Rolling Window (M)" },
        btnRe: { zh: "🚀 重新分析", en: "🚀 Re-Analyze" },
        dPool: { zh: "📦 资产池 (代码, 用逗号分隔)", en: "📦 Asset Pool" },
        btnAdd: { zh: "➕ 添加", en: "➕ Add" },
        btnUp: { zh: "更新池", en: "Update Pool" },
        dBench: { zh: "📊 基准指数", en: "📊 Benchmark" },
        oNoB: { zh: "无基准", en: "No Benchmark" },
        dStress: { zh: "⚠️ 压力测试场景", en: "⚠️ Stress Test" },
        sm: { zh: "市场暴跌", en: "Market Crash" },
        sr: { zh: "利率骤升", en: "Rate Hike" },
        sv: { zh: "波动率冲击", en: "Vol Shock" },
        sAdd: { zh: "➕ 添加", en: "➕ Add" },
        langBtn: { zh: "中 / EN", en: "EN / 中" },
        loading: { zh: "加载中...", en: "Loading..." },
        phPool: { zh: "例如 sh000300, sz399006", en: "e.g. sh000300" },
        oSelIdx: { zh: "— 选择指数 —", en: "— Select Index —" },
        phName: { zh: "场景名称", en: "Scenario Name" },
        phPct: { zh: "% 变化", en: "% Change" },
        sReady: { zh: "✅ 就绪", en: "✅ Ready" }
    };
    const INDEX_NAMES = { 'sh000001': '上证指数', 'sz399001': '深证成指', 'sz399006': '创业板指', 'sh000300': '沪深300', 'sh000016': '上证50', 'sh000905': '中证500', 'sh000852': '中证1000', 'sh000688': '科创50', 'sz399300': '沪深300(深)' };
    const INDEX_NAMES_EN = { 'sh000001': 'SSE Comp', 'sz399001': 'SZSE Comp', 'sz399006': 'ChiNext', 'sh000300': 'CSI 300', 'sh000016': 'SSE 50', 'sh000905': 'CSI 500', 'sh000852': 'CSI 1000', 'sh000688': 'STAR 50', 'sz399300': 'CSI 300(SZ)' };
    const INDEX_LIST = Object.entries(INDEX_NAMES).map(([code, name]) => ({ code, name }));

    let currentLang = 'zh';
    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        document.body.classList.toggle('lang-en', currentLang === 'en');
        const btn = document.getElementById('langBtn');
        if(currentLang === 'en') btn.classList.add('en-active'); else btn.classList.remove('en-active');
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(i18n[key]) { if(el.tagName === 'INPUT') el.placeholder = i18n[key][currentLang]; else el.innerHTML = i18n[key][currentLang]; }
        });
        renderAssetTags(); renderScenarios();
        if (currentResult) runFullAnalysis(); // 重新渲染刷新图表语言
    }
    function getAssetName(code) { return currentLang === 'zh' ? (INDEX_NAMES[code] || code) : (INDEX_NAMES_EN[code] || code); }
    function getScenarioNameTransformed(s) {
        if (s.type === 'market' && (s.name === '市场暴跌' || s.name === 'Market Crash')) return currentLang === 'zh' ? '市场暴跌' : 'Market Crash';
        if (s.type === 'rate' && (s.name === '利率骤升' || s.name === 'Rate Hike')) return currentLang === 'zh' ? '利率骤升' : 'Rate Hike';
        return s.name;
    }
    function getTypeNameTransformed(t) { return currentLang === 'zh' ? (t === 'market' ? '暴跌' : (t === 'rate' ? '利率' : '波动')) : (t === 'market' ? 'Crash' : (t === 'rate' ? 'Rate' : 'Vol')); }

    let myChart = null;
    let assetPool = ['sh000300', 'sz399006', 'sh000688'];
    let scenarios = [];
    let cachedData = null;
    let currentResult = null;
    let isCalculating = false;

    function generateDeterministicData() {
        const store = {}; const assets = Object.keys(INDEX_NAMES); const dates = [];
        let d = new Date('2023-01-01'); const end = new Date('2025-12-31');
        while (d <= end) { if (d.getDay() !== 0 && d.getDay() !== 6) dates.push(d.toISOString().slice(0,10)); d.setDate(d.getDate() + 1); }
        let seed = 1024; function lcg() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
        assets.forEach(code => { store[code] = {}; });
        let prices = { 'sh000001':3000, 'sz399001':11000, 'sz399006':1900, 'sh000300':3400, 'sh000016':2600, 'sh000905':5600, 'sh000852':6200, 'sh000688':850, 'sz399300':3400 };
        dates.forEach(date => {
            let mf = lcg() - 0.488;
            assets.forEach(code => { prices[code] *= (1 + mf * 0.015 + (lcg() - 0.5) * 0.01 + 0.0002); store[code][date] = prices[code]; });
        });
        return store;
    }
    cachedData = generateDeterministicData();

    function mean(arr) { return arr.reduce((a,b)=>a+b,0) / arr.length; }
    function covariance(x, y, mx, my) { let s=0; for (let i=0;i<x.length;i++) s += (x[i]-mx)*(y[i]-my); return s / (x.length-1); }

    async function fetchAssetData(code) {
        try {
            const url = `https://hanson-sw.github.io/data/${code}.json?t=${Date.now()}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('网络请求未响应正常状态码');
            const text = await resp.text();
            if (text.trim().startsWith('<')) throw new Error('遇到HTML页面(可能是404)');
            const data = JSON.parse(text.replace(/NaN/g,'null'));
            const dict = {};
            for (let i=0; i<data.dates.length; i++) dict[data.dates[i]] = data.values[i][1];
            return dict;
        } catch (e) { 
            console.warn(`[${code}] 真实数据拉取失败，自动降级为本地预设模拟数据:`, e);
            return cachedData[code] || null;
        }
    }

    function findNearestDate(targetDate, dateArray) {
        if (!targetDate || !dateArray || dateArray.length === 0) return null;
        let nearest = dateArray[0]; let minDiff = Math.abs(new Date(dateArray[0]) - new Date(targetDate));
        for (let i = 1; i < dateArray.length; i++) {
            const diff = Math.abs(new Date(dateArray[i]) - new Date(targetDate));
            if (diff < minDiff) { minDiff = diff; nearest = dateArray[i]; } else if (diff > minDiff) break; 
        }
        return nearest;
    }

    function solveQP(returns, riskFree, restrictShort) {
        const n = returns.length; if (n === 0) return { weights: [], ret: 0, vol: 0, sharpe: 0 };
        const mu = returns.map(r => mean(r) * 252);
        const cov = Array.from({length:n}, (_,i) => Array.from({length:n}, (_,j) => covariance(returns[i], returns[j], mean(returns[i]), mean(returns[j])) * 252));
        const mu_excess = mu.map(m => m - riskFree);
        let maxExcessIdx = 0; for (let i = 0; i < n; i++) if (mu_excess[i] > mu_excess[maxExcessIdx]) maxExcessIdx = i;
        if (mu_excess[maxExcessIdx] <= 0) return solveMinVarianceProjected(cov, mu, riskFree, restrictShort);
        let v = Array(n).fill(0); v[maxExcessIdx] = 1.0 / mu_excess[maxExcessIdx];
        let lr = 0.01;
        for (let iter = 0; iter < 1500; iter++) {
            let grad = Array(n).fill(0);
            for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) grad[i] += 2 * cov[i][j] * v[j];
            let g_dot_mu = 0, mu_norm_sq = 0;
            for (let i = 0; i < n; i++) { g_dot_mu += grad[i] * mu_excess[i]; mu_norm_sq += mu_excess[i] * mu_excess[i]; }
            let projectionFactor = g_dot_mu / (mu_norm_sq + 1e-12);
            let v_next = Array(n).fill(0);
            for (let i = 0; i < n; i++) { v_next[i] = v[i] - lr * (grad[i] - projectionFactor * mu_excess[i]); if (restrictShort) v_next[i] = Math.max(0, v_next[i]); }
            let currentScale = 0; for (let i = 0; i < n; i++) currentScale += v_next[i] * mu_excess[i];
            if (currentScale > 1e-6) for (let i = 0; i < n; i++) v_next[i] /= currentScale;
            let delta = 0; for (let i = 0; i < n; i++) delta += (v_next[i] - v[i]) ** 2;
            v = v_next; if (delta < 1e-10) break; lr *= 0.998;
        }
        let sum_v = v.reduce((a, b) => a + b, 0);
        let w = Array(n).fill(1 / n); if (Math.abs(sum_v) > 1e-6) w = v.map(x => x / sum_v);
        let portReturn = 0, portVar = 0;
        for (let i = 0; i < n; i++) { portReturn += w[i] * mu[i]; for (let j = 0; j < n; j++) portVar += w[i] * w[j] * cov[i][j]; }
        return { weights: w, ret: portReturn, vol: Math.sqrt(portVar), sharpe: (portReturn - riskFree) / (Math.sqrt(portVar) || 1e-6) };
    }

    function solveMinVarianceProjected(cov, mu, riskFree, restrictShort) {
        const n = cov.length; let w = Array(n).fill(1 / n); let lr = 0.01;
        for (let iter = 0; iter < 1000; iter++) {
            let grad = Array(n).fill(0); for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) grad[i] += 2 * cov[i][j] * w[j];
            let mean_g = grad.reduce((a, b) => a + b, 0) / n;
            let w_next = w.map((v, i) => v - lr * (grad[i] - mean_g));
            if (restrictShort) w_next = w_next.map(x => Math.max(0, x));
            let s = w_next.reduce((a, b) => a + b, 0); w = w_next.map(x => x / (s || 1)); lr *= 0.995;
        }
        let portReturn = 0, portVar = 0;
        for (let i = 0; i < n; i++) { portReturn += w[i] * mu[i]; for (let j = 0; j < n; j++) portVar += w[i] * w[j] * cov[i][j]; }
        return { weights: w, ret: portReturn, vol: Math.sqrt(portVar), sharpe: (portReturn - riskFree) / (Math.sqrt(portVar) || 1e-6) };
    }

    function monteCarloOptimize(returns, numSim, riskFree, restrictShort) {
        const n = returns.length; const mu = returns.map(r => mean(r) * 252);
        const cov = Array.from({length:n}, (_,i) => Array.from({length:n}, (_,j) => covariance(returns[i], returns[j], mean(returns[i]), mean(returns[j])) * 252));
        let bestSharpe = -Infinity, bestW = null, bestRet=0, bestVol=0;
        for (let s=0; s<numSim; s++) {
            let w = Array.from({length:n}, () => restrictShort ? Math.random() : (Math.random() - 0.5) * 2);
            let sum = w.reduce((a,b)=>a+b,0); w = w.map(v => v / (sum || 1));
            let portRet = 0, portVar = 0;
            for (let i=0; i<n; i++) { portRet += w[i] * mu[i]; for (let j=0; j<n; j++) portVar += w[i]*w[j]*cov[i][j]; }
            const portVol = Math.sqrt(portVar); const sharpe = (portRet - riskFree) / (portVol || 1e-6);
            if (sharpe > bestSharpe) { bestSharpe = sharpe; bestW = w.slice(); bestRet = portRet; bestVol = portVol; }
        }
        return { weights: bestW, ret: bestRet, vol: bestVol, sharpe: bestSharpe };
    }

    function setStatus(busy, message) {
        const spinner = document.getElementById('statusSpinner'); const text = document.getElementById('statusText');
        if (busy) { spinner.style.display = 'inline-block'; text.textContent = message || (currentLang === 'zh' ? '⏳ 运算中...' : '⏳ Calc...'); text.style.color = '#475569'; } 
        else { spinner.style.display = 'none'; text.textContent = message || (currentLang === 'zh' ? '✅ 就绪' : '✅ Ready'); text.style.color = (message && message.includes('错误')) ? '#ef4444' : '#475569'; }
    }

    async function runFullAnalysis() {
        if (isCalculating) return; isCalculating = true;
        setStatus(true, currentLang === 'zh' ? '⏳ 正在获取资产底层数据...' : '⏳ Fetching data...');
        try {
            const startDate = document.getElementById('start-date').value; const endDate = document.getElementById('end-date').value;
            const simCount = parseInt(document.getElementById('sim-count').value) || 3000;
            const riskFree = parseFloat(document.getElementById('risk-free-rate').value) / 100;
            const restrictShort = document.getElementById('short-restrict').checked;
            const method = document.getElementById('optim-method').value;
            const windowMonths = parseInt(document.getElementById('window-size').value) || 0;
            const benchmarkCode = document.getElementById('benchmark-select').value;
            const allCodes = [...assetPool]; if (benchmarkCode && !allCodes.includes(benchmarkCode)) allCodes.push(benchmarkCode);

            const dataStore = {};
            await Promise.all(allCodes.map(async (code) => { const dict = await fetchAssetData(code); if (dict) dataStore[code] = dict; }));
            for (let code of allCodes) if (!dataStore[code]) throw new Error(currentLang === 'zh' ? `数据源读取故障: ${code}` : `Data missing: ${code}`);

            let globalDates = Object.keys(dataStore[assetPool[0]]).sort();
            for (let code of allCodes) globalDates = globalDates.filter(d => dataStore[code][d] !== undefined && dataStore[code][d] !== null);

            const backtestDates = globalDates.filter(d => d >= startDate && d <= endDate).sort();
            if (backtestDates.length < 15) throw new Error(currentLang === 'zh' ? '选定区间内有效交易日过少' : 'Insufficient trading days');

            const scenarioShocks = {};
            scenarios.forEach(sc => { const targetDate = findNearestDate(sc.date, backtestDates); if (targetDate) scenarioShocks[targetDate] = (scenarioShocks[targetDate] || 0) + (sc.value / 100); });

            const lookbackDays = windowMonths > 0 ? windowMonths * 21 : 126;
            let netValues = [1.0]; let dailyRets = []; let activeWeights = null; let finalDisplayedWeights = null;

            setStatus(true, currentLang === 'zh' ? '⏳ 量化引擎动态回测中...' : '⏳ Walk-forward Backtesting...');

            for (let i = 0; i < backtestDates.length - 1; i++) {
                const currentDate = backtestDates[i]; const nextDate = backtestDates[i+1];
                if (i % 21 === 0 || activeWeights === null) {
                    const gIdx = globalDates.indexOf(currentDate);
                    let startLookbackIdx = Math.max(0, gIdx - lookbackDays);
                    const winHistoryDates = globalDates.slice(startLookbackIdx, gIdx);
                    if (winHistoryDates.length > 10) {
                        const winReturnsMatrix = assetPool.map(code => {
                            const r = []; for (let j = 1; j < winHistoryDates.length; j++) r.push((dataStore[code][winHistoryDates[j]] - dataStore[code][winHistoryDates[j-1]]) / dataStore[code][winHistoryDates[j-1]]); return r;
                        });
                        let res = method === 'qp' ? solveQP(winReturnsMatrix, riskFree, restrictShort) : monteCarloOptimize(winReturnsMatrix, simCount, riskFree, restrictShort);
                        activeWeights = res.weights; if (!finalDisplayedWeights) finalDisplayedWeights = activeWeights;
                    } else { activeWeights = Array(assetPool.length).fill(1 / assetPool.length); if (!finalDisplayedWeights) finalDisplayedWeights = activeWeights; }
                }
                let dayStrategyRet = 0;
                for (let a = 0; a < assetPool.length; a++) dayStrategyRet += activeWeights[a] * ((dataStore[assetPool[a]][nextDate] - dataStore[assetPool[a]][currentDate]) / dataStore[assetPool[a]][currentDate]);
                if (scenarioShocks[nextDate]) dayStrategyRet += scenarioShocks[nextDate];
                dailyRets.push(dayStrategyRet); netValues.push(netValues[netValues.length - 1] * (1 + dayStrategyRet));
            }
            if(!finalDisplayedWeights) finalDisplayedWeights = activeWeights || Array(assetPool.length).fill(1/assetPool.length);

            const totalBacktestDays = dailyRets.length;
            const optRet = mean(dailyRets) * 252;
            const optVol = Math.sqrt(dailyRets.reduce((a,b)=>a+b*b,0)/totalBacktestDays - mean(dailyRets)**2) * Math.sqrt(252);
            let peak = 1.0, maxDD = 0;
            for (let v of netValues) { if (v > peak) peak = v; const dd = (peak - v) / peak; if (dd > maxDD) maxDD = dd; }
            const negRets = dailyRets.filter(r => r < 0);
            let downsideVol = Math.sqrt(negRets.length ? negRets.reduce((a,b)=>a+b*b,0) / totalBacktestDays : 0) * Math.sqrt(252);
            const sortino = downsideVol ? (optRet - riskFree) / downsideVol : 0; const calmar = maxDD ? optRet / maxDD : 0; const optSharpe = (optRet - riskFree) / (optVol || 1e-6);

            const fmtPct = v => (v * 100).toFixed(2) + '%';
            document.getElementById('opt-return-vol').innerText = `${fmtPct(optRet)} / ${fmtPct(optVol)}`;
            document.getElementById('opt-drawdown').innerText = fmtPct(maxDD);
            document.getElementById('sub-risk-metrics').innerHTML = `MaxDD: ${fmtPct(maxDD)}<br>Calmar: ${calmar.toFixed(2)}`;
            document.getElementById('opt-sharpe-sortino').innerText = `${optSharpe.toFixed(2)} / ${sortino.toFixed(2)}`;
            
            let wStr = assetPool.map((code, i) => `${code.toUpperCase()}(${getAssetName(code)}): ${(finalDisplayedWeights[i] * 100).toFixed(1)}%`).join(' | ');
            document.getElementById('opt-weights').innerText = (currentLang === 'zh' ? '基准配比: ' : 'Base Mix: ') + wStr;

            let benchmarkValues = null;
            if (benchmarkCode && dataStore[benchmarkCode]) {
                const bPrices = backtestDates.map(d => dataStore[benchmarkCode][d]); const base = bPrices[0] || 1; benchmarkValues = bPrices.map(p => p / base);
            }

            currentResult = { netValues, allDates: backtestDates };
            setStatus(true, currentLang === 'zh' ? '⏳ 渲染ECharts中...' : '⏳ Rendering...');
            renderChart(backtestDates, netValues, benchmarkValues, benchmarkCode);
            setStatus(false, currentLang === 'zh' ? '✅ 回测完成' : '✅ Done');
        } catch (err) { setStatus(false, '❌ 错误: ' + err.message); } finally { isCalculating = false; }
    }

    function renderChart(dates, netValues, benchmarkValues, benchmarkCode) {
        if (!myChart) myChart = echarts.init(document.getElementById('chart-container'));

        const scenarioData = scenarios.map(sc => { const nearest = findNearestDate(sc.date, dates); return nearest ? { ...sc, date: nearest } : null; }).filter(Boolean);
        const markLineData = scenarioData.map(sc => ({
            xAxis: sc.date,
            label: { formatter: `${getScenarioNameTransformed(sc)}\n${getTypeNameTransformed(sc.type)}: ${sc.value}%`, position: 'insideEndTop', fontSize: 10, color: '#ef4444' },
            lineStyle: { color: '#ef4444', type: 'dashed', width: 2 }
        }));

        const sNav = currentLang === 'zh' ? '策略组合净值' : 'Strategy NAV';
        let series = [{
            name: sNav, type: 'line', data: netValues, smooth: true, symbol: 'none',
            lineStyle: { width: 1.5, color: '#8b5cf6' }, // 🌟 修复：曲线变细
            areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [{ offset: 0, color: 'rgba(139,92,246,0.3)' }, { offset: 1, color: 'rgba(139,92,246,0.0)' }]) },
            markLine: { silent: true, data: markLineData, label: { show: true, formatter: '{b}', fontSize: 10 } }
        }];

        if (benchmarkValues && benchmarkCode) {
            series.push({
                name: currentLang === 'zh' ? `基准指数 (${getAssetName(benchmarkCode)})` : `Bench (${getAssetName(benchmarkCode)})`,
                type: 'line', data: benchmarkValues, smooth: true, symbol: 'none',
                lineStyle: { width: 1.2, color: '#ef4444', type: 'dashed' } // 🌟 修复：曲线变细
            });
        }

        const option = {
            title: { text: currentLang === 'zh' ? 'Walk-forward 净值表现与压力回测' : 'Walk-forward NAV & Stress Test', left: 'center', top: 5, textStyle: { fontSize: 16 } },
            tooltip: { trigger: 'axis' },
            toolbox: { feature: { dataZoom: { yAxisIndex: 'none' }, saveAsImage: { name: 'Quant_Report', pixelRatio: 2 } }, right: 20, top: 10 },
            legend: { data: series.map(s => s.name), bottom: 35 },
            grid: { left: 60, right: 30, top: 60, bottom: 85 },
            dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', start: 0, end: 100, bottom: 5, height: 20 }],
            xAxis: {
                type: 'category', data: dates, boundaryGap: false,
                axisLabel: { 
                    rotate: 30, fontSize: 9, color: 'rgba(71, 85, 105, 0.7)',
                    interval: Math.floor(dates.length / 15),
                    formatter: function(value, index) {
                        if (!value) return '';
                        // 🌟 修复：期初和跨年时显示完整年份 YYYY-MM-DD
                        if (index === 0) return value; 
                        let prevDate = dates[index - 1];
                        if (prevDate && value.substring(0, 4) !== prevDate.substring(0, 4)) return value;
                        return value.substring(5); // 否则只显示 MM-DD
                    }
                }
            },
            yAxis: { type: 'value', name: currentLang === 'zh' ? '净值' : 'NAV', scale: true, nameGap: 25 },
            series: series
        };
        myChart.setOption(option, true);
        myChart.resize();

        // 🌟 修复：启动呼吸灯动画效果（2秒周期）
        if (window.markoBreathInterval) clearInterval(window.markoBreathInterval);
        let breathPhase = 0;
        window.markoBreathInterval = setInterval(() => {
            if (!myChart) return;
            breathPhase += Math.PI / 20; // 50ms更新一次，走完2PI刚好2000ms
            let intensity = (Math.sin(breathPhase) + 1) / 2; // 0 到 1 平滑波动
            let alpha = 0.4 + 0.6 * intensity; // 透明度 0.4 到 1.0
            
            myChart.setOption({
                series: [{
                    // 利用局部 setOption 动态修改第一条（策略组合）线的发光颜色，不会影响整体缩放
                    lineStyle: { 
                        color: `rgba(139, 92, 246, ${alpha})`,
                        shadowColor: `rgba(139, 92, 246, ${alpha * 0.8})`,
                        shadowBlur: 2 + 8 * intensity,
                        width: 1.5
                    }
                }]
            });
        }, 50);
    }

    function updateAssetPool() { const input = document.getElementById('asset-input'); const codes = input.value.split(',').map(s => s.trim().toLowerCase()).filter(s => s); if (codes.length < 2) { alert('至少保留2个标的'); return; } assetPool = codes; renderAssetTags(); runFullAnalysis(); }
    function renderAssetTags() { document.getElementById('asset-tags').innerHTML = assetPool.map((code, idx) => `<span class="asset-tag">${code.toUpperCase()} (${getAssetName(code)})<span class="del" onclick="removeAsset(${idx})">✕</span></span>`).join(''); document.getElementById('asset-input').value = assetPool.join(', '); }
    function removeAsset(idx) { assetPool.splice(idx, 1); if (assetPool.length < 2) assetPool = ['sh000300', 'sz399006']; renderAssetTags(); runFullAnalysis(); }
    function addSelectedAsset() { const select = document.getElementById('asset-select'); const code = select.value; if (!code) return; if (!assetPool.includes(code)) { assetPool.push(code); renderAssetTags(); runFullAnalysis(); } select.value = ''; }
    function addScenario() { const name = document.getElementById('scenario-name').value.trim() || '自定义冲击'; const type = document.getElementById('scenario-type').value; const value = parseFloat(document.getElementById('scenario-value').value); let date = document.getElementById('scenario-date').value; if (!date || isNaN(value)) return; scenarios.push({ name, type, value, date }); renderScenarios(); runFullAnalysis(); }
    function removeScenario(idx) { scenarios.splice(idx, 1); renderScenarios(); runFullAnalysis(); }
    function renderScenarios() { document.getElementById('scenario-list').innerHTML = scenarios.map((s, idx) => `<span class="scenario-item"><span class="info"><strong>${getScenarioNameTransformed(s)}</strong><span class="type">${getTypeNameTransformed(s.type)}</span><span style="color:${s.value < 0 ? '#ef4444' : '#10b981'}">${s.value}%</span><span style="color:#64748b;font-size:11px;">${s.date}</span></span><span class="del" onclick="removeScenario(${idx})">✕</span></span>`).join(''); }

    function initUI() {
        const select = document.getElementById('asset-select'); const datalist = document.getElementById('stock-database'); const benchSelect = document.getElementById('benchmark-select');
        INDEX_LIST.forEach(({code, name}) => {
            select.appendChild(new Option(`${code} (${name})`, code));
            datalist.appendChild(new Option(`${code} (${name})`, code));
            benchSelect.appendChild(new Option(`${code} (${name})`, code));
        });
        scenarios.push({ name: '市场暴跌', type: 'market', value: -12.5, date: '2025-06-12' });
        scenarios.push({ name: '利率骤升', type: 'rate', value: 0.4, date: '2025-10-15' });
        renderScenarios(); renderAssetTags();
        document.getElementById('benchmark-select').value = 'sh000300';
        runFullAnalysis();
        window.addEventListener('resize', () => { if (myChart) myChart.resize(); });
    }
    window.onload = initUI;
</script>
