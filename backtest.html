<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro版 资产配置回测终端 (视觉增强版)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f1f5f9; --card: #ffffff; --border: #cbd5e1; --text: #334155; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        .sidebar { width: 350px; background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .sidebar h3 { margin: 0 0 10px 0; font-size: 18px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 12px; font-weight: bold; color: #64748b; }
        input[type="text"], input[type="number"], input[type="date"] { padding: 8px; border: 1px solid var(--border); border-radius: 6px; }
        
        .asset-list { display: flex; flex-direction: column; gap: 10px; }
        .asset-item { display: flex; gap: 5px; align-items: center; background: var(--bg); padding: 8px; border-radius: 6px; }
        .asset-item input { width: 100%; }
        .btn-remove { background: #ef4444; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; }
        
        .btn-add { background: var(--bg); border: 1px dashed var(--border); padding: 10px; border-radius: 6px; cursor: pointer; text-align: center; color: var(--text); font-weight: bold; }
        .btn-add:hover { background: #e2e8f0; }
        .btn-run { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: transform 0.1s; }
        .btn-run:hover { background: #2563eb; transform: translateY(-1px); }

        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; }
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-title { font-size: 12px; color: #64748b; margin-bottom: 5px; }
        .stat-val { font-size: 20px; font-weight: bold; }
        .positive { color: #ef4444; } 
        .negative { color: #10b981; }
        #chart-container { flex: 1; background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 999; font-size: 20px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <datalist id="stock-database">
        <option value="sh000001">上证指数</option>
        <option value="sz399001">深证成指</option>
        <option value="sz399006">创业板指</option>
        <option value="sh000300">沪深300</option>
        <option value="sh000016">上证50</option>
        <option value="sh000905">中证500</option>
        <option value="sh000852">中证1000</option>
        <option value="sz399300">沪深300(深)</option>
        <option value="sh000688">科创50</option>
    </datalist>

    <div id="loading-overlay">正在拉取真实数据并对齐日历...</div>

    <div class="sidebar">
        <h3>🛠️ 组合构建器</h3>
        <div class="form-group">
            <label>组合名称</label>
            <input type="text" id="portfolio-name" value="我的全天候策略">
        </div>
        <div class="form-group" style="flex-direction: row; gap: 10px;">
            <div style="flex: 1;"><label>开始日期</label><input type="date" id="start-date" value="2020-01-01" style="width:100%"></div>
            <div style="flex: 1;"><label>结束日期</label><input type="date" id="end-date" value="2023-12-31" style="width:100%"></div>
        </div>
        <div class="form-group">
            <label>基准标的</label>
            <input type="text" id="benchmark-code" value="sh000688" list="stock-database" placeholder="输入代码联想">
        </div>

        <h3>📦 资产配置 (权重须为100%)</h3>
        <div class="asset-list" id="assets-container"></div>
        <button class="btn-add" onclick="addAssetRow()">+ 添加一只股票/指数</button>
        <button class="btn-run" onclick="runBacktest()">🚀 执行回测计算</button>
        <div id="weight-warning" style="color:#ef4444; font-size:12px; display:none;">总权重不等于100%！当前: <span id="current-weight"></span>%</div>
    </div>

    <div class="main-content">
        <div class="stats-container">
            <div class="stat-card"><div class="stat-title">年化收益率 (Ann. Return)</div><div class="stat-val" id="val-return">--</div></div>
            <div class="stat-card"><div class="stat-title">最大回撤 (Max Drawdown)</div><div class="stat-val" id="val-drawdown">--</div></div>
            <div class="stat-card"><div class="stat-title">夏普比率 (Sharpe Ratio)</div><div class="stat-val" id="val-sharpe">--</div></div>
            <div class="stat-card"><div class="stat-title">索提诺比率 (Sortino Ratio)</div><div class="stat-val" id="val-sortino">--</div></div>
        </div>
        <div id="chart-container"></div>
    </div>

    <script>
        const myChart = echarts.init(document.getElementById('chart-container'));
        let assets = [
            { code: 'sh000688', weight: 100 }
        ];
        
        // 动画定时器 ID (用于重置回测时清除上一个动画)
        let glowInterval = null;

        function renderAssets() {
            const container = document.getElementById('assets-container');
            container.innerHTML = '';
            let totalWeight = 0;
            assets.forEach((asset, index) => {
                totalWeight += asset.weight;
                const div = document.createElement('div');
                div.className = 'asset-item';
                div.innerHTML = `
                    <input type="text" list="stock-database" placeholder="代码" value="${asset.code}" onchange="updateAsset(${index}, 'code', this.value)" style="flex:2">
                    <input type="number" placeholder="权重%" value="${asset.weight}" onchange="updateAsset(${index}, 'weight', this.value)" style="flex:1">
                    <button class="btn-remove" onclick="removeAsset(${index})">X</button>
                `;
                container.appendChild(div);
            });
            const warningBox = document.getElementById('weight-warning');
            warningBox.style.display = totalWeight !== 100 ? 'block' : 'none';
            if(totalWeight !== 100) document.getElementById('current-weight').innerText = totalWeight;
        }

        function updateAsset(index, key, value) { assets[index][key] = key === 'weight' ? parseFloat(value) || 0 : value; renderAssets(); }
        function addAssetRow() { assets.push({ code: '', weight: 0 }); renderAssets(); }
        function removeAsset(index) { assets.splice(index, 1); renderAssets(); }

        // 数据拉取核心 (带去NaN强心针版)
        async function fetchAssetData(code) {
            if (!code) return null;
            const cleanCode = code.trim().toLowerCase();
            const url = "https://hanson-sw.github.io/data/" + cleanCode + ".json";
            try {
                const fetchUrl = url + "?t=" + new Date().getTime();
                const response = await fetch(fetchUrl);
                if (!response.ok) { alert(`❌ 找不到 ${cleanCode}，请检查代码或等待Actions抓取。`); return null; }
                const textData = await response.text();
                if (textData.trim().startsWith("<")) return null;
                
                const cleanTextData = textData.replace(/NaN/g, 'null');
                const data = JSON.parse(cleanTextData);
                
                const priceDict = {};
                for (let i = 0; i < data.dates.length; i++) {
                    priceDict[data.dates[i]] = data.values[i][1]; 
                }
                return priceDict;
            } catch (error) {
                console.error("加载数据报错", error);
                return null;
            }
        }

        function calculateMetrics(dailyReturns) {
            if(dailyReturns.length === 0) return { annReturn: 0, sharpe: 0, sortino: 0 };
            const TRADING_DAYS = 252;
            const RISK_FREE_RATE = 0.02; 
            let cumulativeReturn = 1;
            for(let r of dailyReturns) cumulativeReturn *= (1 + r);
            const years = dailyReturns.length / TRADING_DAYS;
            const annReturn = Math.pow(cumulativeReturn, 1 / years) - 1;
            const meanReturn = dailyReturns.reduce((a,b)=>a+b,0) / dailyReturns.length;
            let variance = dailyReturns.reduce((acc, val) => acc + Math.pow(val - meanReturn, 2), 0) / dailyReturns.length;
            const annVolatility = Math.sqrt(variance) * Math.sqrt(TRADING_DAYS);
            const sharpe = annVolatility === 0 ? 0 : (annReturn - RISK_FREE_RATE) / annVolatility;
            const negativeReturns = dailyReturns.filter(r => r < 0);
            let downsideVariance = negativeReturns.length > 0 ? negativeReturns.reduce((acc, val) => acc + Math.pow(val, 2), 0) / dailyReturns.length : 0;
            const downsideVolatility = Math.sqrt(downsideVariance) * Math.sqrt(TRADING_DAYS);
            const sortino = downsideVolatility === 0 ? 0 : (annReturn - RISK_FREE_RATE) / downsideVolatility;
            return { annReturn, sharpe, sortino };
        }

        async function runBacktest() {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const benchmarkCode = document.getElementById('benchmark-code').value;
            const portName = document.getElementById('portfolio-name').value;
            const totalWeight = assets.reduce((sum, a) => sum + a.weight, 0);

            if (totalWeight !== 100) return alert("组合权重总和必须等于 100%");
            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                const codesToFetch = [benchmarkCode, ...assets.map(a => a.code)];
                const uniqueCodes = [...new Set(codesToFetch.filter(c => c))]; 
                
                const dataStore = {};
                await Promise.all(uniqueCodes.map(async (code) => {
                    const dict = await fetchAssetData(code);
                    if(dict) dataStore[code] = dict;
                }));

                if (!dataStore[benchmarkCode]) throw new Error("基准数据缺失");

                let alignedDates = Object.keys(dataStore[benchmarkCode]).filter(date => date >= startDate && date <= endDate).sort();
                for (let asset of assets) {
                    if (!dataStore[asset.code]) continue;
                    alignedDates = alignedDates.filter(date => dataStore[asset.code][date] !== undefined && dataStore[asset.code][date] !== null);
                }

                if (alignedDates.length === 0) return alert("该时间段内没有共同的有效交易日！");

                let portPrices = [1.0];
                let benchPrices = [1.0];
                let portDailyReturns = [];
                let maxDrawdown = 0;
                let peak = 1.0;
                
                for (let i = 1; i < alignedDates.length; i++) {
                    const today = alignedDates[i];
                    const yesterday = alignedDates[i-1];

                    const benchTodayPrice = dataStore[benchmarkCode][today];
                    const benchYestPrice = dataStore[benchmarkCode][yesterday];
                    const benchReturn = (benchTodayPrice - benchYestPrice) / benchYestPrice;
                    benchPrices.push(benchPrices[i-1] * (1 + benchReturn));

                    let portTodayReturn = 0;
                    for (let asset of assets) {
                        const code = asset.code;
                        const weight = asset.weight / 100;
                        const todayPrice = dataStore[code][today];
                        const yestPrice = dataStore[code][yesterday];
                        const assetReturn = (todayPrice - yestPrice) / yestPrice;
                        portTodayReturn += weight * assetReturn;
                    }

                    portDailyReturns.push(portTodayReturn);
                    const currentNetValue = portPrices[i-1] * (1 + portTodayReturn);
                    portPrices.push(currentNetValue);

                    if (currentNetValue > peak) peak = currentNetValue;
                    let dd = (peak - currentNetValue) / peak;
                    if (dd > maxDrawdown) maxDrawdown = dd;
                }

                const metrics = calculateMetrics(portDailyReturns);
                const fmtNum = (num) => (num * 100).toFixed(2) + '%';
                
                document.getElementById('val-return').innerText = fmtNum(metrics.annReturn);
                document.getElementById('val-return').className = 'stat-val ' + (metrics.annReturn >= 0 ? 'positive' : 'negative');
                
                document.getElementById('val-drawdown').innerText = fmtNum(maxDrawdown);
                document.getElementById('val-drawdown').className = 'stat-val negative'; 
                
                document.getElementById('val-sharpe').innerText = metrics.sharpe.toFixed(2);
                document.getElementById('val-sharpe').className = 'stat-val ' + (metrics.sharpe >= 0 ? 'positive' : 'negative');
                
                document.getElementById('val-sortino').innerText = metrics.sortino.toFixed(2);
                document.getElementById('val-sortino').className = 'stat-val ' + (metrics.sortino >= 0 ? 'positive' : 'negative');

                // 准备要印在图表上的文本数据
                const displayMetrics = {
                    annReturn: fmtNum(metrics.annReturn),
                    maxDrawdown: fmtNum(maxDrawdown),
                    sharpe: metrics.sharpe.toFixed(2),
                    sortino: metrics.sortino.toFixed(2)
                };

                renderChart(alignedDates, portPrices, benchPrices, portName, benchmarkCode, displayMetrics);

            } catch (error) {
                console.error(error);
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function renderChart(dates, portData, benchData, portName, benchName, metricsObj) {
            // 清除之前的发光动画，防止每次点击执行后动画加速叠加
            if (glowInterval) clearInterval(glowInterval);

            const option = {
                title: { text: `净值走势对比: ${portName}`, subtext: '起始净值: 1.0', left: 'center', top: 10 },
                tooltip: { trigger: 'axis' },
                legend: { data: ['组合净值', `基准(${benchName})`], bottom: 0 },
                // backgroundColor: '#ffffff', // 确保下载图片时背景是白色而不是透明
                toolbox: { 
                    feature: { 
                        saveAsImage: { 
                            name: `回测结果_${portName}`, 
                            pixelRatio: 2, // 提高下载图片的清晰度
                            backgroundColor: '#fff'
                        } 
                    }, 
                    right: 20 
                },
                grid: { left: '5%', right: '5%', bottom: '10%', top: '18%', containLabel: true },
                xAxis: { type: 'category', boundaryGap: false, data: dates },
                yAxis: { type: 'value', scale: true },
                dataZoom: [{ type: 'inside', start: 0, end: 100 }, { show: true, type: 'slider', bottom: '2%' }],
                
                // 📊 亮点功能：图内水印浮窗 (完美附带在下载的图片中)
                graphic: [
                    {
                        type: 'group',
                        left: '8%',
                        top: '15%',
                        children: [
                            {
                                type: 'rect', z: 100, shape: { width: 170, height: 100, r: 8 },
                                style: { fill: 'rgba(255, 255, 255, 0.9)', stroke: '#cbd5e1', lineWidth: 1, shadowBlur: 8, shadowColor: 'rgba(0,0,0,0.1)' }
                            },
                            {
                                type: 'text', z: 100, left: 15, top: 15,
                                style: {
                                    fill: '#334155',
                                    text: `【核心指标分析】\n\n年化收益率: ${metricsObj.annReturn}\n最大回撤:    ${metricsObj.maxDrawdown}\n夏普比率:    ${metricsObj.sharpe}\n索提诺比率: ${metricsObj.sortino}`,
                                    font: 'bold 12px sans-serif',
                                    lineHeight: 18
                                }
                            }
                        ]
                    }
                ],

                series: [
                    { 
                        name: '组合净值', 
                        type: 'line', 
                        data: portData, 
                        smooth: true, 
                        symbol: 'none', 
                        zlevel: 1, // 确保这条红线永远在虚线之上
                        lineStyle: { width: 4, color: '#ef4444' } // 初始鲜红色加粗
                    },
                    { 
                        name: `基准(${benchName})`, 
                        type: 'line', 
                        data: benchData, 
                        smooth: true, 
                        symbol: 'none', 
                        zlevel: 0,
                        // 对比度优化：基准线设为灰色、变细、虚线
                        lineStyle: { width: 2, color: '#94a3b8', type: 'dashed' } 
                    }
                ]
            };
            
            // 首次渲染
            myChart.setOption(option, true);

            // 🌟 亮点功能：每隔一秒由浅入深的呼吸灯动画
            let startTime = Date.now();
            glowInterval = setInterval(() => {
                const timeElapsed = Date.now() - startTime;
                
                // 正弦波形计算：周期 2000 毫秒 (1秒变深，1秒变浅)
                const phase = (Math.sin(timeElapsed / 1000 * Math.PI) + 1) / 2; 

                // 颜色通道混合：在 亮红 (239, 68, 68) 和 暗深红 (127, 29, 29) 之间过渡
                const r = Math.round(239 - phase * (239 - 127));
                const g = Math.round(68 - phase * (68 - 29));
                const b = Math.round(68 - phase * (68 - 29));
                
                // 光晕大小动态收缩
                const shadowSize = 3 + phase * 12;

                // 局部刷新机制：只更新颜色和光晕，不消耗额外性能
                myChart.setOption({
                    series: [{
                        name: '组合净值',
                        lineStyle: {
                            color: `rgb(${r}, ${g}, ${b})`,
                            shadowBlur: shadowSize,
                            shadowColor: `rgba(${r}, ${g}, ${b}, 0.8)`
                        }
                    }]
                });
            }, 50); // 每 50ms (即20帧/秒) 渲染一帧动画
        }

        renderAssets();
    </script>
</body>
</html>
